<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body>
    <h1>{{ title }}</h1>

    <div>
        {% for key, video in all_videos.items() %}
            <a href="{{ url_for('watch', lesson_key=key) }}">{{ video.title }}</a><br>
        {% endfor %}
    </div>

    <br>

    <iframe
        src="https://player.mediadelivery.net/embed/618406/{{ video_id }}"
        loading="lazy"
        style="border:0; width:900px; height:500px; max-width:100%;"
        allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
    ></iframe>

    <br><br>

    <form method="post" action="{{ url_for('logout') }}">
        <button type="submit">התנתקות</button>
    </form>
</body>
</html>
